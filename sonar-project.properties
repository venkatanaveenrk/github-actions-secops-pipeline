# NOTE: organization and projectKey below are placeholders only.
# .github/workflows/devsecops-pipeline.yml overrides both at run time via
# `-Dsonar.organization=${{ github.repository_owner }}` and a matching
# projectKey, so you don't need to edit this file — SonarCloud just needs a
# project created under your account with a matching key (see README).
sonar.projectKey=YOUR_ORG_github-actions-secops-pipeline
sonar.organization=YOUR_ORG
sonar.projectName=GitHub Actions SecOps Pipeline
sonar.projectVersion=1.0

sonar.sources=sample-app/src
sonar.tests=sample-app/tests
sonar.exclusions=**/node_modules/**,**/coverage/**,**/*.test.js

sonar.javascript.lcov.reportPaths=sample-app/coverage/lcov.info
sonar.testExecutionReportPaths=sample-app/coverage/test-results.xml

sonar.qualitygate.wait=true
