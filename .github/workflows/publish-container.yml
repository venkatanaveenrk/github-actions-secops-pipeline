# =============================================================================
#  Container Publish Pipeline
#  Triggers: push to main (after all security checks pass)
#  Publishes to GitHub Container Registry (GHCR) — completely free
# =============================================================================

name: Publish Container

on:
  push:
    branches: [main]
    tags: ["v*.*.*"]

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}/sample-app

jobs:

  # ── Security gate — must pass before publishing ──────────────────────────────
  security-gate:
    name: 🔐 Security Gate
    uses: ./.github/workflows/devsecops-pipeline.yml
    secrets: inherit
    permissions:
      contents: read
      security-events: write

  # ── Build and push only if security passes ───────────────────────────────────
  publish:
    name: 🚀 Publish to GHCR
    runs-on: ubuntu-latest
    needs: [security-gate]
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata for Docker
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=ref,event=branch
            type=ref,event=pr
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=sha,prefix=sha-

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: sample-app
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Run final Trivy scan on published image
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:main
          format: table
          severity: CRITICAL
          exit-code: "0"
