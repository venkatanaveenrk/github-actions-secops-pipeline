# =============================================================================
#  DevSecOps Pipeline — Full Security Scan
#  Triggers: push to main/develop, pull requests, manual dispatch
#  Tools: Gitleaks, SonarCloud, Trivy, OWASP ZAP, Checkov, Infracost
#  NOTE: no schedule trigger here on purpose — weekly-audit.yml owns the
#  recurring scan (opt-in via the ENABLE_WEEKLY_AUDIT repo variable) so the
#  two workflows don't both fire at the same time every Monday.
# =============================================================================

name: DevSecOps Pipeline

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]
  workflow_dispatch:        # Manual trigger

env:
  APP_NAME: sample-app
  IMAGE_NAME: ${{ github.repository }}/sample-app
  NODE_VERSION: "20"
  PYTHON_VERSION: "3.11"

# Required so Trivy/Checkov SARIF uploads reach Security → Code scanning
# alerts even on repos where the default GITHUB_TOKEN is read-only.
permissions:
  contents: read
  security-events: write

jobs:

  # ── Job 1: Secret Detection ─────────────────────────────────────────────────
  secret-scan:
    name: 🔑 Secret Detection
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0   # Full history needed for secret scanning

      - name: Run Gitleaks
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITLEAKS_LICENSE: ${{ secrets.GITLEAKS_LICENSE }}

      - name: Upload Gitleaks report
        if: failure()
        continue-on-error: true
        uses: actions/upload-artifact@v4
        with:
          name: gitleaks-report
          path: results.sarif
          retention-days: 30

  # ── Job 2: Code Quality with SonarCloud ─────────────────────────────────────
  code-quality:
    name: 📊 Code Quality
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: sample-app/package-lock.json

      - name: Install dependencies
        working-directory: sample-app
        run: npm ci

      - name: Run tests with coverage
        working-directory: sample-app
        run: npm test -- --coverage --coverageReporters=lcov

      - name: SonarCloud scan
        # Optional: only runs if SONAR_TOKEN is configured. Tests above still
        # run either way, so coverage/test feedback isn't gated on SonarCloud.
        if: ${{ secrets.SONAR_TOKEN != '' }}
        uses: SonarSource/sonarcloud-github-action@master
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
        with:
          args: >
            -Dsonar.organization=${{ github.repository_owner }}
            -Dsonar.projectKey=${{ github.repository_owner }}_github-actions-secops-pipeline
            -Dsonar.sources=sample-app/src
            -Dsonar.tests=sample-app/tests
            -Dsonar.javascript.lcov.reportPaths=sample-app/coverage/lcov.info

  # ── Job 3: Dependency Vulnerability Scan ────────────────────────────────────
  dependency-scan:
    name: 📦 Dependency Scan
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Install dependencies
        working-directory: sample-app
        run: npm ci

      - name: Run npm audit
        working-directory: sample-app
        run: npm audit --audit-level=high --json > npm-audit.json || true

      - name: Run Trivy dependency scan
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: fs
          scan-ref: sample-app
          format: sarif
          output: trivy-deps.sarif
          severity: CRITICAL,HIGH
          exit-code: "0"

      - name: Upload dependency scan results
        uses: github/codeql-action/upload-sarif@v3
        if: always()
        continue-on-error: true
        with:
          sarif_file: trivy-deps.sarif
          category: dependency-scan

      - name: Upload npm audit report
        uses: actions/upload-artifact@v4
        continue-on-error: true
        with:
          name: npm-audit-report
          path: sample-app/npm-audit.json
          retention-days: 30

  # ── Job 4: Build Docker Image ────────────────────────────────────────────────
  build:
    name: 🐳 Build Docker Image
    runs-on: ubuntu-latest
    needs: [secret-scan]
    outputs:
      image-digest: ${{ steps.build.outputs.digest }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build image
        id: build
        uses: docker/build-push-action@v5
        with:
          context: sample-app
          push: false
          tags: ${{ env.IMAGE_NAME }}:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          outputs: type=docker,dest=/tmp/image.tar

      - name: Upload image artifact
        uses: actions/upload-artifact@v4
        with:
          name: docker-image
          path: /tmp/image.tar
          retention-days: 1

  # ── Job 5: Container Security Scan with Trivy ────────────────────────────────
  container-scan:
    name: 🔍 Container Security Scan
    runs-on: ubuntu-latest
    needs: [build]
    steps:
      - name: Download image artifact
        uses: actions/download-artifact@v4
        with:
          name: docker-image
          path: /tmp

      - name: Load Docker image
        run: docker load --input /tmp/image.tar

      - name: Run Trivy container scan
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: ${{ env.IMAGE_NAME }}:${{ github.sha }}
          format: sarif
          output: trivy-container.sarif
          severity: CRITICAL,HIGH
          exit-code: "1"
          ignore-unfixed: true

      - name: Upload container scan results
        uses: github/codeql-action/upload-sarif@v3
        if: always()
        continue-on-error: true
        with:
          sarif_file: trivy-container.sarif
          category: container-scan

      - name: Run Trivy container scan (table format for PR comment)
        if: github.event_name == 'pull_request'
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: ${{ env.IMAGE_NAME }}:${{ github.sha }}
          format: table
          severity: CRITICAL,HIGH
          exit-code: "0"

  # ── Job 6: Infrastructure as Code Security Scan ──────────────────────────────
  iac-scan:
    name: 🏗️ IaC Security Scan
    runs-on: ubuntu-latest
    # Optional: only runs if a terraform/ directory is present in the repo.
    # Azure infra (Terraform/Checkov/Infracost) is not required for the
    # security gates or application scanning to work.
    if: hashFiles('terraform/**') != ''
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Run Checkov on Terraform
        uses: bridgecrewio/checkov-action@master
        with:
          directory: terraform
          framework: terraform
          output_format: sarif
          output_file_path: checkov-results.sarif
          soft_fail: true
          skip_check: CKV_AZURE_1,CKV_AZURE_2

      - name: Upload Checkov results
        uses: github/codeql-action/upload-sarif@v3
        if: always()
        continue-on-error: true
        with:
          sarif_file: checkov-results.sarif
          category: iac-scan

      - name: Run Checkov summary
        uses: bridgecrewio/checkov-action@master
        with:
          directory: terraform
          framework: terraform
          output_format: cli
          soft_fail: true

  # ── Job 7: Terraform Cost Estimation ─────────────────────────────────────────
  cost-estimate:
    name: 💰 Cost Estimation
    runs-on: ubuntu-latest
    # Optional: only runs on PRs when a terraform/ directory is present.
    if: github.event_name == 'pull_request' && hashFiles('terraform/**') != ''
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Infracost
        uses: infracost/actions/setup@v3
        with:
          api-key: ${{ secrets.INFRACOST_API_KEY }}

      - name: Run Infracost
        run: |
          infracost breakdown \
            --path terraform \
            --format json \
            --out-file infracost.json

      - name: Post Infracost comment on PR
        uses: infracost/actions/comment@v3
        with:
          path: infracost.json
          behavior: update

  # ── Job 8: OWASP ZAP Web App Scan ────────────────────────────────────────────
  dast-scan:
    name: 🌐 DAST — Web App Scan
    runs-on: ubuntu-latest
    needs: [build]
    if: github.event_name != 'pull_request'
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Download image artifact
        uses: actions/download-artifact@v4
        with:
          name: docker-image
          path: /tmp

      - name: Load and start app container
        run: |
          docker load --input /tmp/image.tar
          docker run -d \
            --name sample-app \
            -p 8080:8080 \
            -e NODE_ENV=test \
            ${{ env.IMAGE_NAME }}:${{ github.sha }}
          sleep 10
          curl -f http://localhost:8080/health || exit 1

      - name: Run OWASP ZAP baseline scan
        uses: zaproxy/action-baseline@v0.12.0
        with:
          target: http://localhost:8080
          rules_file_name: .zap/rules.tsv
          cmd_options: "-I"
          artifact_name: zap-report

      - name: Stop app container
        if: always()
        run: docker stop sample-app || true

  # ── Job 9: Security Summary Report ───────────────────────────────────────────
  security-summary:
    name: 📋 Security Summary
    runs-on: ubuntu-latest
    needs:
      - secret-scan
      - code-quality
      - dependency-scan
      - container-scan
      - iac-scan
    if: always()
    steps:
      - name: Generate security summary
        run: |
          echo "## 🔒 DevSecOps Security Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Check | Status |" >> $GITHUB_STEP_SUMMARY
          echo "|-------|--------|" >> $GITHUB_STEP_SUMMARY
          echo "| 🔑 Secret Detection | ${{ needs.secret-scan.result == 'success' && '✅ Passed' || '❌ Failed' }} |" >> $GITHUB_STEP_SUMMARY
          echo "| 📊 Code Quality | ${{ needs.code-quality.result == 'success' && '✅ Passed' || '⚠️ Check SonarCloud' }} |" >> $GITHUB_STEP_SUMMARY
          echo "| 📦 Dependency Scan | ${{ needs.dependency-scan.result == 'success' && '✅ Passed' || '❌ Vulnerabilities Found' }} |" >> $GITHUB_STEP_SUMMARY
          echo "| 🔍 Container Scan | ${{ needs.container-scan.result == 'success' && '✅ Passed' || '❌ CVEs Found' }} |" >> $GITHUB_STEP_SUMMARY
          echo "| 🏗️ IaC Security | ${{ needs.iac-scan.result == 'success' && '✅ Passed' || needs.iac-scan.result == 'skipped' && '⏭️ Skipped (no terraform/)' || '⚠️ Misconfigs Found' }} |" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Commit:** ${{ github.sha }}" >> $GITHUB_STEP_SUMMARY
          echo "**Branch:** ${{ github.ref_name }}" >> $GITHUB_STEP_SUMMARY
          echo "**Triggered by:** ${{ github.actor }}" >> $GITHUB_STEP_SUMMARY
